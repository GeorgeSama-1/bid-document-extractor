<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>解析结果浏览器</title>
    <link rel="stylesheet" href="/jobs.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        color: #1f2933;
        background: #f6f8fb;
      }
      .app {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        min-height: 100vh;
      }
      aside {
        border-right: 1px solid #d8dee8;
        background: #ffffff;
        overflow: auto;
      }
      main {
        overflow: auto;
        padding: 20px 24px 40px;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 14px;
        border-bottom: 1px solid #d8dee8;
        background: #ffffff;
      }
      select,
      button {
        height: 34px;
        border: 1px solid #c8d0dc;
        border-radius: 6px;
        background: #ffffff;
        color: #1f2933;
      }
      select {
        min-width: 190px;
        padding: 0 10px;
      }
      button {
        padding: 0 10px;
        cursor: pointer;
      }
      .tree {
        padding: 10px 8px 24px;
        font-size: 14px;
      }
      .tree ul {
        list-style: none;
        margin: 0;
        padding-left: 14px;
      }
      .tree li {
        margin: 2px 0;
      }
      .tree button {
        width: 100%;
        height: auto;
        min-height: 28px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        border: 0;
        background: transparent;
        text-align: left;
        line-height: 1.35;
      }
      .tree button:hover,
      .tree button.active {
        background: #eef4ff;
      }
      .tree .material {
        color: #0f5c8f;
        font-weight: 600;
      }
      .header {
        margin-bottom: 18px;
      }
      .header h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.3;
      }
      .muted {
        color: #697586;
        font-size: 13px;
      }
      details.item {
        margin: 10px 0;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #ffffff;
      }
      details.item summary {
        cursor: pointer;
        padding: 12px 14px;
        font-weight: 650;
        line-height: 1.45;
      }
      .item-body {
        border-top: 1px solid #eef1f5;
        padding: 12px 14px 16px;
      }
      .text {
        white-space: pre-wrap;
        line-height: 1.7;
      }
      img.preview {
        display: block;
        max-width: 100%;
        max-height: 760px;
        border: 1px solid #d8dee8;
        border-radius: 6px;
        background: #ffffff;
      }
      pre {
        overflow: auto;
        margin: 0;
        padding: 12px;
        border-radius: 6px;
        background: #f2f5f9;
        line-height: 1.55;
      }
      table {
        border-collapse: collapse;
        max-width: 100%;
        overflow: auto;
        background: #ffffff;
      }
      td,
      th {
        border: 1px solid #d8dee8;
        padding: 6px 8px;
        vertical-align: top;
      }
      .empty,
      .error {
        padding: 18px;
        border: 1px dashed #c8d0dc;
        border-radius: 8px;
        background: #ffffff;
      }
      .error {
        color: #9b1c1c;
      }
      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }
        aside {
          max-height: 42vh;
          border-right: 0;
          border-bottom: 1px solid #d8dee8;
        }
      }
    </style>
  </head>
  <body>
    <section class="jobs-shell" aria-labelledby="jobsHeading">
      <div class="jobs-heading">
        <div><h1 id="jobsHeading">GPU 文档提取任务</h1><p>同卡任务按提交顺序执行，不同 GPU 可并行。</p></div>
        <div class="heading-actions">
          <button id="jobsRefresh" type="button">刷新任务</button>
          <button id="jobsClearHistory" class="danger-button" type="button">清空历史</button>
        </div>
      </div>
      <form id="jobForm" enctype="multipart/form-data">
        <fieldset class="form-section">
          <legend>任务与输出</legend>
          <div class="job-fields">
            <label>PDF 文件<input name="pdf" type="file" accept="application/pdf,.pdf" required /></label>
            <label>运行 GPU<select name="gpu_id" required><option value="">读取中…</option></select></label>
            <label>输出根目录名<input name="path_root" type="text" value="PDF" maxlength="100" required /></label>
          </div>
        </fieldset>
        <fieldset class="form-section">
          <legend>版面与 OCR</legend>
          <div class="job-switches">
            <label class="switch"><input name="enable_pp_structure" type="checkbox" checked />启用 PP-Structure 版面分析</label>
            <label>运行设备<select name="pp_structure_device"><option value="gpu">GPU</option><option value="cpu">CPU</option></select></label>
          </div>
          <div class="job-flags">
            <label><input name="pp_structure_use_doc_orientation_classify" type="checkbox" /> 文档方向分类</label>
            <label><input name="pp_structure_use_doc_unwarping" type="checkbox" /> 文档展平</label>
            <label><input name="pp_structure_use_textline_orientation" type="checkbox" /> 文本行方向</label>
          </div>
        </fieldset>
        <fieldset class="form-section">
          <legend>表格 VLM 增强</legend>
          <label class="switch"><input name="enable_vlm_table" type="checkbox" checked />启用 VLM 表格增强</label>
          <div class="job-fields vlm-fields">
            <label>VLM Endpoint<input name="vlm_endpoint" type="url" placeholder="https://vlm.example/v1" required /></label>
            <label>VLM 模型<input name="vlm_model" type="text" maxlength="200" required /></label>
            <label>API Key<input name="api_key" type="password" autocomplete="off" /></label>
            <label>Timeout（秒）<input name="vlm_timeout" type="number" value="1800" min="1" max="3600" /></label>
            <label>Max tokens<input name="vlm_max_tokens" type="number" value="8192" min="256" max="32768" /></label>
            <label>Workers<input name="vlm_workers" type="number" value="16" min="1" max="128" /></label>
          </div>
        </fieldset>
        <div class="job-submit-row">
          <button id="jobSubmit" type="submit">上传并创建任务</button>
          <span id="jobFormMessage" role="status"></span>
        </div>
      </form>
      <div class="jobs-grid">
        <div class="jobs-list-wrap">
          <table class="jobs-list">
            <thead><tr><th>任务</th><th>状态</th><th>GPU</th><th>进度</th><th>操作</th></tr></thead>
            <tbody id="jobsBody"></tbody>
          </table>
        </div>
        <section id="jobDetail" class="job-detail empty" aria-live="polite">选择任务查看详情、日志和结果文件。</section>
      </div>
    </section>
    <div class="app">
      <aside>
        <div class="toolbar">
          <select id="runSelect" aria-label="run"></select>
          <button id="refreshButton" type="button">刷新</button>
        </div>
        <div id="tree" class="tree"></div>
      </aside>
      <main>
        <div class="header">
          <h1 id="title">解析结果浏览器</h1>
          <div id="subtitle" class="muted">请选择左侧材料目录</div>
        </div>
        <div id="content" class="empty">只读取 outputs 中已有结果，不启动解析任务。</div>
      </main>
    </div>
    <script>
      const state = {
        run: "",
        selectedPath: "",
        expandedPaths: new Set([""]),
      };

      const runSelect = document.querySelector("#runSelect");
      const refreshButton = document.querySelector("#refreshButton");
      const treeRoot = document.querySelector("#tree");
      const title = document.querySelector("#title");
      const subtitle = document.querySelector("#subtitle");
      const content = document.querySelector("#content");

      function api(url) {
        return fetch(url).then(async (response) => {
          if (!response.ok) {
            const body = await response.text();
            throw new Error(body || response.statusText);
          }
          return response.json();
        });
      }

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function setError(message) {
        content.className = "error";
        content.textContent = message;
      }

      async function loadRuns() {
        const data = await api("/api/runs");
        const previousRun = state.run;
        runSelect.innerHTML = "";
        for (const run of data.runs) {
          const option = document.createElement("option");
          option.value = run.name;
          option.textContent = run.name;
          runSelect.appendChild(option);
        }
        if (data.runs.some((run) => run.name === previousRun)) runSelect.value = previousRun;
        state.run = runSelect.value || "";
        if (!state.run) {
          treeRoot.innerHTML = "";
          setError("未找到 outputs/<run>/modules 目录。");
          return;
        }
        await loadTree();
      }

      async function loadTree() {
        const tree = await api(`/api/runs/${encodeURIComponent(state.run)}/modules/tree`);
        treeRoot.innerHTML = "";
        treeRoot.appendChild(renderTreeNode(tree));
      }

      function renderTreeNode(node) {
        const wrapper = document.createElement("ul");
        const li = document.createElement("li");
        li.className = "tree-node";
        const row = document.createElement("div");
        row.className = "tree-row";
        const hasChildren = Boolean(node.children?.length);
        const children = hasChildren ? document.createElement("ul") : null;
        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "tree-toggle";
        toggle.disabled = !hasChildren;
        const expanded = state.expandedPaths.has(node.path);
        toggle.textContent = hasChildren ? (expanded ? "▾" : "▸") : "·";
        toggle.setAttribute("aria-label", expanded ? "折叠目录" : "展开目录");
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tree-label${node.is_material ? " material" : ""}`;
        button.textContent = `${hasChildren ? "📁" : "📄"} ${node.name}`;
        button.title = node.path || node.name;
        if (node.is_material) {
          button.addEventListener("click", () => selectMaterial(node.path, button));
        }
        row.append(toggle, button);
        li.appendChild(row);
        if (children) {
          for (const child of node.children) {
            children.append(...renderTreeNode(child).children);
          }
          children.hidden = !expanded;
          toggle.addEventListener("click", () => {
            children.hidden = !children.hidden;
            toggle.textContent = children.hidden ? "▸" : "▾";
            if (children.hidden) state.expandedPaths.delete(node.path);
            else state.expandedPaths.add(node.path);
          });
          li.appendChild(children);
        }
        wrapper.appendChild(li);
        return wrapper;
      }

      async function selectMaterial(materialPath, button) {
        state.selectedPath = materialPath;
        document.querySelectorAll(".tree .tree-label.active").forEach((node) => node.classList.remove("active"));
        button.classList.add("active");
        content.className = "empty";
        content.textContent = "读取中...";
        try {
          const [meta, ordered] = await Promise.all([
            api(`/api/runs/${encodeURIComponent(state.run)}/materials/meta?path=${encodeURIComponent(materialPath)}`),
            api(`/api/runs/${encodeURIComponent(state.run)}/materials/ordered?path=${encodeURIComponent(materialPath)}`),
          ]);
          title.textContent = meta.material_title || ordered.material_title || materialPath.split("/").at(-1);
          subtitle.textContent = meta.section_path || ordered.section_path || materialPath;
          renderItems(ordered.items || []);
        } catch (error) {
          setError(error.message);
        }
      }

      function itemTitle(item, index) {
        const page = item.page_no ? ` · p.${item.page_no}` : "";
        const name =
          item.text ||
          item.table_title ||
          item.image_title ||
          item.title ||
          item.material_title ||
          item.type;
        return `${index + 1}. ${item.type}${page} · ${String(name).slice(0, 90)}`;
      }

      function renderItems(items) {
        content.className = "";
        content.innerHTML = "";
        if (!items.length) {
          content.className = "empty";
          content.textContent = "该材料没有 ordered items。";
          return;
        }
        items.forEach((item, index) => {
          const details = document.createElement("details");
          details.className = "item";
          if (index < 3) details.open = true;
          details.innerHTML = `<summary>${esc(itemTitle(item, index))}</summary>`;
          const body = document.createElement("div");
          body.className = "item-body";
          body.appendChild(renderItemBody(item));
          details.appendChild(body);
          content.appendChild(details);
        });
      }

      function renderItemBody(item) {
        if (item.type === "text") {
          const div = document.createElement("div");
          div.className = "text";
          div.textContent = item.text || item.content || JSON.stringify(item, null, 2);
          return div;
        }
        if (item.type === "image" && item.preview_url) {
          const wrap = document.createElement("div");
          const image = document.createElement("img");
          image.className = "preview";
          image.src = item.preview_url;
          image.alt = item.image_title || "image";
          wrap.appendChild(image);
          wrap.appendChild(renderJson(item));
          return wrap;
        }
        if (item.type === "table" && item.detail_item_name) {
          const wrap = document.createElement("div");
          wrap.textContent = "读取表格中...";
          loadDetail(item, item.detail_item_name).then((detail) => {
            wrap.innerHTML = "";
            wrap.appendChild(renderTableOrJson(detail));
          }).catch((error) => {
            wrap.textContent = error.message;
          });
          return wrap;
        }
        if (item.type === "submaterial" && item.target_material_path) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = "进入子材料";
          button.addEventListener("click", () => {
            title.textContent = item.title || item.material_title || "子材料";
            selectMaterial(item.target_material_path, button);
          });
          return button;
        }
        return renderJson(item);
      }

      function loadDetail(item, itemName) {
        const params = new URLSearchParams({
          material_path: state.selectedPath,
          item_type: item.type,
          item_name: itemName,
        });
        return api(`/api/runs/${encodeURIComponent(state.run)}/items/detail?${params.toString()}`);
      }

      function renderTableOrJson(detail) {
        if (Array.isArray(detail.rows) && detail.rows.length) {
          const table = document.createElement("table");
          detail.rows.forEach((row) => {
            const tr = document.createElement("tr");
            row.forEach((cell) => {
              const td = document.createElement("td");
              td.textContent = cell ?? "";
              tr.appendChild(td);
            });
            table.appendChild(tr);
          });
          return table;
        }
        return renderJson(detail);
      }

      function renderJson(value) {
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(value, null, 2);
        return pre;
      }

      runSelect.addEventListener("change", async () => {
        state.run = runSelect.value;
        state.selectedPath = "";
        state.expandedPaths = new Set([""]);
        title.textContent = "解析结果浏览器";
        subtitle.textContent = "请选择左侧材料目录";
        await loadTree().catch((error) => setError(error.message));
      });
      refreshButton.addEventListener("click", () => loadRuns().catch((error) => setError(error.message)));

      window.resultBrowserLoadRuns = loadRuns;
      loadRuns().catch((error) => setError(error.message));
    </script>
    <script src="/jobs.js"></script>
  </body>
</html>
